name: Release Hotblock

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build universal app
        env:
          HOTBLOCK_ARCHS: arm64 x86_64
          HOTBLOCK_BUILD_NUMBER: ${{ github.run_number }}
        run: |
          export HOTBLOCK_VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/build-app.sh
          lipo dist/Hotblock.app/Contents/MacOS/Hotblock -verify_arch arm64 x86_64
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' dist/Hotblock.app/Contents/Info.plist)" = "$HOTBLOCK_VERSION"
      - name: Create disk image
        run: |
          ./scripts/create-dmg.sh Hotblock.dmg
          hdiutil verify Hotblock.dmg
          shasum -a 256 Hotblock.dmg > Hotblock.dmg.sha256
      - name: Write release instructions
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Install

          1. Download and open `Hotblock.dmg`.
          2. Drag Hotblock into the Applications folder.
          3. Right-click Hotblock in Applications and choose **Open**.
          4. If macOS blocks it, open **System Settings → Privacy & Security**, then click **Open Anyway**.
          5. Follow Hotblock's setup assistant to allow Automation and notifications.

          This free GitHub beta is open source and built automatically by GitHub Actions. It is ad-hoc signed, not Apple-notarized, so macOS shows a warning on first launch.

          The app requires macOS 14 or newer and supports both Apple Silicon and Intel Macs.
          EOF
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md --title "Hotblock $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" Hotblock.dmg Hotblock.dmg.sha256
