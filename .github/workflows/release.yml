name: Release Hotblock

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Build app
        run: ./scripts/build-app.sh
      - name: Create download archive
        run: ditto -c -k --keepParent dist/Hotblock.app Hotblock.zip
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" Hotblock.zip --generate-notes --title "Hotblock $GITHUB_REF_NAME"
